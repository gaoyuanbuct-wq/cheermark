<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1200" viewBox="0 0 800 1200" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="glow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#00e676" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#04120b" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#00e676" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <radialGradient id="spot" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#04120b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="1200" fill="#04120b"/>
  <rect width="800" height="1200" fill="url(#glow)"/>
  <rect width="800" height="1200" fill="url(#grid)"/>
  <rect width="800" height="1200" fill="url(#spot)"/>
  <!-- confetti -->
  <circle cx="120" cy="180" r="4" fill="#00e676" opacity="0.35"/>
  <circle cx="640" cy="260" r="3" fill="#fbbf24" opacity="0.4"/>
  <circle cx="420" cy="140" r="3.5" fill="#c084fc" opacity="0.3"/>
  <rect x="280" y="320" width="6" height="6" fill="#39ff9c" opacity="0.25" transform="rotate(25 283 323)"/>
  <rect x="560" y="420" width="5" height="5" fill="#f472b6" opacity="0.3" transform="rotate(-15 562 422)"/>
</svg>
