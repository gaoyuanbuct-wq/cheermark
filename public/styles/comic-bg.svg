<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" fill="none">
  <rect width="1440" height="900" fill="#fff5d6"/>
  <!-- halftone-style dots -->
  <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="1.5" fill="#1a1208" opacity="0.06"/>
  </pattern>
  <rect width="1440" height="900" fill="url(#dots)"/>
  <!-- comic speedlines suggestion at top -->
  <line x1="720" y1="0" x2="0" y2="600" stroke="#ff6b35" stroke-opacity="0.04" stroke-width="2"/>
  <line x1="720" y1="0" x2="240" y2="600" stroke="#ff6b35" stroke-opacity="0.04" stroke-width="2"/>
  <line x1="720" y1="0" x2="480" y2="600" stroke="#ff6b35" stroke-opacity="0.03" stroke-width="2"/>
  <line x1="720" y1="0" x2="960" y2="600" stroke="#ff6b35" stroke-opacity="0.03" stroke-width="2"/>
  <line x1="720" y1="0" x2="1200" y2="600" stroke="#ff6b35" stroke-opacity="0.04" stroke-width="2"/>
  <line x1="720" y1="0" x2="1440" y2="600" stroke="#ff6b35" stroke-opacity="0.04" stroke-width="2"/>
</svg>
